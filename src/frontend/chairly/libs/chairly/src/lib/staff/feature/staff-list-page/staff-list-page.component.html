<div class="flex min-h-screen flex-col bg-gray-50 dark:bg-slate-900">
  <!-- Page header -->
  <chairly-page-header title="Medewerkers">
    <button
      actions
      type="button"
      class="inline-flex items-center rounded-md bg-primary-600 px-4 py-2 text-sm font-medium text-white hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 dark:bg-primary-500 dark:hover:bg-primary-600"
      (click)="openAddDialog()">
      + Medewerker toevoegen
    </button>
  </chairly-page-header>

  <!-- Reset password success banner -->
  @if (resetPasswordSuccess()) {
    <div
      class="mx-6 mt-3 rounded-md border border-green-200 bg-green-50 p-3 text-sm text-green-700 dark:border-green-800 dark:bg-green-900/20 dark:text-green-300">
      {{ resetPasswordSuccess() }}
    </div>
  }

  <!-- Mutation error -->
  @if (mutationError()) {
    <p class="px-6 pt-3 text-sm text-red-600 dark:text-red-400">{{ mutationError() }}</p>
  }

  <!-- Content -->
  <div class="flex-1 overflow-auto p-6">
    @if (isLoading()) {
      <chairly-loading-indicator message="Medewerkers laden..." />
    } @else {
      <chairly-staff-table
        [staffMembers]="staffMembers()"
        (edit)="onEdit($event)"
        (resetPassword)="onResetPassword($event)"
        (deactivate)="onDeactivate($event)"
        (reactivate)="onReactivate($event)" />
    }
  </div>
</div>

<!-- Staff form dialog (create and edit) -->
<chairly-staff-form-dialog
  [staffMember]="selectedStaff()"
  [apiError]="apiEmailError()"
  (saved)="onSave($event)"
  (cancelled)="onCancelled()"
  (resetPassword)="onResetPasswordFromFormDialog()" />

<!-- Deactivate confirmation dialog -->
<chairly-confirmation-dialog
  #deactivateDialog
  title="Medewerker deactiveren"
  message="Weet je zeker dat je deze medewerker wilt deactiveren?"
  confirmLabel="Deactiveren"
  (confirmed)="onConfirmDeactivate()" />

<!-- Reset password confirmation dialog -->
<chairly-confirmation-dialog
  #resetPasswordDialog
  title="Wachtwoord resetten"
  message="Weet je zeker dat je een wachtwoord-reset e-mail wilt versturen naar deze medewerker?"
  confirmLabel="Versturen"
  cancelLabel="Annuleren"
  (confirmed)="onConfirmResetPassword()" />
