@if (photoUrl()) {
  <img
    [src]="photoUrl()"
    [alt]="initials()"
    [class]="sizeClass() + ' rounded-full object-cover'"
  />
} @else {
  <div
    [class]="sizeClass() + ' rounded-full flex items-center justify-center text-white text-xs font-semibold'"
    [style.background-color]="color()"
  >
    {{ initials() }}
  </div>
}
