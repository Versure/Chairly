@switch (booking().status) {
  @case ('Scheduled') {
    <div class="flex items-center justify-end gap-1">
      <button
        type="button"
        class="inline-flex items-center rounded border border-blue-200 bg-blue-50 px-2 py-1 text-xs font-medium text-blue-700 transition-colors hover:border-blue-300 hover:bg-blue-100 dark:border-blue-600 dark:bg-blue-700 dark:text-white dark:hover:border-blue-500 dark:hover:bg-blue-600"
        (click)="emitAction('confirm'); $event.stopPropagation()">
        Bevestigen
      </button>
      <button
        type="button"
        class="inline-flex items-center rounded border border-yellow-200 bg-yellow-50 px-2 py-1 text-xs font-medium text-yellow-700 transition-colors hover:border-yellow-300 hover:bg-yellow-100 dark:border-yellow-600 dark:bg-yellow-700 dark:text-white dark:hover:border-yellow-500 dark:hover:bg-yellow-600"
        (click)="emitAction('start'); $event.stopPropagation()">
        Starten
      </button>
      <button
        type="button"
        class="inline-flex items-center rounded border border-red-200 bg-red-50 px-2 py-1 text-xs font-medium text-red-600 transition-colors hover:border-red-300 hover:bg-red-100 dark:border-red-600 dark:bg-red-700 dark:text-white dark:hover:border-red-500 dark:hover:bg-red-600"
        (click)="emitAction('cancel'); $event.stopPropagation()">
        Annuleren
      </button>
      <button
        type="button"
        class="inline-flex items-center rounded border border-orange-200 bg-orange-50 px-2 py-1 text-xs font-medium text-orange-700 transition-colors hover:border-orange-300 hover:bg-orange-100 dark:border-orange-600 dark:bg-orange-700 dark:text-white dark:hover:border-orange-500 dark:hover:bg-orange-600"
        (click)="emitAction('noShow'); $event.stopPropagation()">
        Niet-verschenen
      </button>
    </div>
  }
  @case ('Confirmed') {
    <div class="flex items-center justify-end gap-1">
      <button
        type="button"
        class="inline-flex items-center rounded border border-yellow-200 bg-yellow-50 px-2 py-1 text-xs font-medium text-yellow-700 transition-colors hover:border-yellow-300 hover:bg-yellow-100 dark:border-yellow-600 dark:bg-yellow-700 dark:text-white dark:hover:border-yellow-500 dark:hover:bg-yellow-600"
        (click)="emitAction('start'); $event.stopPropagation()">
        Starten
      </button>
      <button
        type="button"
        class="inline-flex items-center rounded border border-red-200 bg-red-50 px-2 py-1 text-xs font-medium text-red-600 transition-colors hover:border-red-300 hover:bg-red-100 dark:border-red-600 dark:bg-red-700 dark:text-white dark:hover:border-red-500 dark:hover:bg-red-600"
        (click)="emitAction('cancel'); $event.stopPropagation()">
        Annuleren
      </button>
      <button
        type="button"
        class="inline-flex items-center rounded border border-orange-200 bg-orange-50 px-2 py-1 text-xs font-medium text-orange-700 transition-colors hover:border-orange-300 hover:bg-orange-100 dark:border-orange-600 dark:bg-orange-700 dark:text-white dark:hover:border-orange-500 dark:hover:bg-orange-600"
        (click)="emitAction('noShow'); $event.stopPropagation()">
        Niet-verschenen
      </button>
    </div>
  }
  @case ('InProgress') {
    <div class="flex items-center justify-end gap-1">
      <button
        type="button"
        class="inline-flex items-center rounded border border-green-200 bg-green-50 px-2 py-1 text-xs font-medium text-green-700 transition-colors hover:border-green-300 hover:bg-green-100 dark:border-green-600 dark:bg-green-700 dark:text-white dark:hover:border-green-500 dark:hover:bg-green-600"
        (click)="emitAction('complete'); $event.stopPropagation()">
        Voltooien
      </button>
      <button
        type="button"
        class="inline-flex items-center rounded border border-red-200 bg-red-50 px-2 py-1 text-xs font-medium text-red-600 transition-colors hover:border-red-300 hover:bg-red-100 dark:border-red-600 dark:bg-red-700 dark:text-white dark:hover:border-red-500 dark:hover:bg-red-600"
        (click)="emitAction('cancel'); $event.stopPropagation()">
        Annuleren
      </button>
    </div>
  }
}
