<dialog
  #dialogEl
  class="fixed inset-0 m-0 w-screen h-screen max-w-none max-h-none flex items-center justify-center border-0 bg-black/50 p-4">
  <div
    class="bg-white dark:bg-slate-800 rounded-lg shadow-xl w-full max-w-2xl mx-auto flex flex-col max-h-[90vh]">
    <div
      class="flex items-center justify-between border-b border-gray-200 dark:border-gray-700 px-6 py-4">
      <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Voorbeeld e-mail</h2>
      <button
        type="button"
        class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"
        (click)="close()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          viewBox="0 0 20 20"
          fill="currentColor">
          <path
            fill-rule="evenodd"
            d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
            clip-rule="evenodd" />
        </svg>
      </button>
    </div>

    <div class="px-6 py-4">
      <div class="mb-3">
        <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Onderwerp:</span>
        <p class="text-sm font-bold text-gray-900 dark:text-white mt-1">{{ subject() }}</p>
      </div>
    </div>

    <div class="flex-1 overflow-hidden px-6 pb-4">
      <iframe
        #previewIframe
        class="w-full h-96 border border-gray-200 dark:border-gray-700 rounded-md"
        sandbox="allow-same-origin"
        title="E-mail voorbeeld"></iframe>
    </div>

    <div class="flex justify-end border-t border-gray-200 dark:border-gray-700 px-6 py-4">
      <button
        type="button"
        class="rounded-md bg-gray-100 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-200 dark:bg-slate-700 dark:text-gray-200 dark:hover:bg-slate-600"
        (click)="close()">
        Sluiten
      </button>
    </div>
  </div>
</dialog>
