<div class="p-6">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">BTW-instellingen</h1>
    <p class="mt-1 text-sm text-gray-600 dark:text-gray-400">
      Het standaard BTW-tarief wordt automatisch toegepast op diensten zonder afzonderlijk
      BTW-tarief.
    </p>
  </div>

  @if (isLoading()) {
    <p class="text-gray-500 dark:text-gray-400">Laden...</p>
  } @else {
    <div
      class="max-w-md rounded-lg border border-gray-200 bg-white p-6 dark:border-slate-700 dark:bg-slate-800">
      @if (saveSuccess()) {
        <div
          class="mb-4 rounded-md bg-green-50 p-3 text-sm text-green-800 dark:bg-green-900/30 dark:text-green-300">
          Instellingen opgeslagen
        </div>
      }

      @if (saveError()) {
        <div
          class="mb-4 rounded-md bg-red-50 p-3 text-sm text-red-800 dark:bg-red-900/30 dark:text-red-300">
          {{ saveError() }}
        </div>
      }

      <div class="mb-4">
        <label
          for="defaultVatRate"
          class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
          >Standaard BTW-tarief</label
        >
        <select
          id="defaultVatRate"
          [formControl]="defaultVatRateControl"
          class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-primary-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
          <option [ngValue]="0">0%</option>
          <option [ngValue]="9">9%</option>
          <option [ngValue]="21">21%</option>
        </select>
      </div>

      <button
        type="button"
        [disabled]="isSaving() || defaultVatRateControl.invalid"
        class="rounded-md bg-primary-600 px-4 py-2 text-sm font-medium text-white hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 dark:bg-primary-500 dark:hover:bg-primary-600"
        (click)="onSave()">
        {{ isSaving() ? 'Opslaan...' : 'Opslaan' }}
      </button>
    </div>
  }
</div>
