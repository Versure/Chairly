<div class="flex min-h-screen flex-col bg-gray-50 dark:bg-slate-900">
  <!-- Page header -->
  <chairly-page-header title="Klanten">
    <button
      actions
      type="button"
      class="inline-flex items-center rounded-md bg-primary-600 px-4 py-2 text-sm font-medium text-white hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 dark:bg-primary-500 dark:hover:bg-primary-600"
      (click)="openAddDialog()">
      + Klant toevoegen
    </button>
  </chairly-page-header>

  <!-- Mutation error -->
  @if (mutationError()) {
    <p class="px-6 pt-3 text-sm text-red-600 dark:text-red-400">{{ mutationError() }}</p>
  }

  <!-- Content -->
  <div class="flex-1 overflow-auto p-6">
    @if (isLoading()) {
      <chairly-loading-indicator message="Klanten laden..." />
    } @else {
      <chairly-client-table
        [clients]="clients()"
        (rowClick)="onRowClick($event)"
        (edit)="onEdit($event)"
        (delete)="onDelete($event)" />
    }
  </div>
</div>

<!-- Client form dialog (create and edit) -->
<chairly-client-form-dialog
  [client]="selectedClient()"
  (saved)="onSave($event)"
  (cancelled)="onCancelled()" />

<!-- Delete confirmation dialog -->
<chairly-confirmation-dialog
  #deleteDialog
  title="Klant verwijderen"
  message="Weet je zeker dat je deze klant wilt verwijderen? Dit kan niet ongedaan worden gemaakt."
  confirmLabel="Verwijderen"
  [isDestructive]="true"
  (confirmed)="onConfirmDelete()" />
