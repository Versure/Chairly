<section
  class="bg-gradient-to-br from-primary-50 to-primary-100 py-20 dark:from-slate-900 dark:to-slate-800 sm:py-28">
  <div class="mx-auto max-w-7xl px-4 text-center sm:px-6 lg:px-8">
    <h1
      class="text-4xl font-extrabold tracking-tight text-gray-900 dark:text-white sm:text-5xl lg:text-6xl">
      {{ heading() }}
    </h1>
    <p class="mx-auto mt-6 max-w-2xl text-lg text-gray-700 dark:text-slate-300 sm:text-xl">
      {{ subheading() }}
    </p>
    <div class="mt-10 flex flex-col items-center justify-center gap-4 sm:flex-row">
      <a
        [routerLink]="primaryCtaLink()"
        class="rounded-lg bg-primary-600 px-8 py-3 text-base font-semibold text-white shadow-sm hover:bg-primary-700">
        {{ primaryCtaLabel() }}
      </a>
      <a
        [routerLink]="secondaryCtaLink()"
        class="rounded-lg border border-primary-600 bg-white px-8 py-3 text-base font-semibold text-primary-600 shadow-sm hover:bg-primary-50 dark:border-primary-400 dark:bg-slate-800 dark:text-primary-400 dark:hover:bg-slate-700">
        {{ secondaryCtaLabel() }}
      </a>
    </div>
  </div>
</section>
