<div
  class="rounded-lg border border-gray-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
  <div
    class="mb-4 flex h-12 w-12 items-center justify-center rounded-lg bg-primary-50 dark:bg-slate-700">
    <svg
      class="h-6 w-6 text-primary-600 dark:text-primary-400"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="1.5"
      stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="iconPath()" />
    </svg>
  </div>
  @if (title()) {
    <h3 class="mb-2 text-lg font-semibold text-gray-900 dark:text-white">{{ title() }}</h3>
  }
  @if (description()) {
    <p class="text-sm text-gray-700 dark:text-slate-300">{{ description() }}</p>
  }
</div>
