<chairly-web-header />

<main class="flex-1 bg-gray-50 py-12 dark:bg-slate-900 sm:py-16">
  <div class="mx-auto max-w-2xl px-4 sm:px-6 lg:px-8">
    @if (isLoading()) {
      <p class="text-center text-gray-700 dark:text-slate-300">Laden...</p>
    } @else if (selectedPlan()) {
      <div class="text-center">
        <h1 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white sm:text-4xl">
          {{ heading() }}
        </h1>
        <p class="mt-4 text-lg text-gray-700 dark:text-slate-300">
          {{ subheading() }}
        </p>
      </div>

      <div class="mt-10 rounded-lg bg-white p-6 shadow-sm dark:bg-slate-800 sm:p-8">
        <chairly-web-subscribe-form
          [selectedPlan]="selectedPlan()!"
          [billingCycle]="billingCycle()"
          [isTrial]="isTrial()"
          [isSubmitting]="isSubmitting()"
          [submitError]="submitError()"
          (formSubmit)="onFormSubmit($event)" />
      </div>
    }
  </div>
</main>

<chairly-web-footer />
