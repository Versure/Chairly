<header class="bg-white shadow-sm dark:bg-slate-900 dark:shadow-slate-700/30">
  <nav class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
    <a routerLink="/" class="text-2xl font-bold text-primary-600 dark:text-primary-400">Chairly</a>

    <!-- Desktop navigation -->
    <div class="hidden items-center gap-6 md:flex">
      <a
        routerLink="/"
        class="text-sm font-medium text-gray-700 hover:text-primary-600 dark:text-slate-300 dark:hover:text-primary-400"
        >Home</a
      >
      <a
        routerLink="/demo-aanvragen"
        class="text-sm font-medium text-gray-700 hover:text-primary-600 dark:text-slate-300 dark:hover:text-primary-400"
        >Demo aanvragen</a
      >
      <a
        routerLink="/aanmelden"
        class="rounded-md bg-primary-600 px-4 py-2 text-sm font-medium text-white hover:bg-primary-700"
        >Aanmelden</a
      >
    </div>

    <!-- Mobile hamburger -->
    <button type="button" class="md:hidden" aria-label="Menu openen" (click)="toggleMobileMenu()">
      <svg
        class="h-6 w-6 text-gray-700 dark:text-slate-300"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>
  </nav>

  <!-- Mobile menu -->
  @if (mobileMenuOpen()) {
    <div
      class="border-t border-gray-200 px-4 pb-4 pt-2 dark:border-slate-700 dark:bg-slate-900 md:hidden">
      <a
        routerLink="/"
        class="block py-2 text-sm font-medium text-gray-700 hover:text-primary-600 dark:text-slate-300 dark:hover:text-primary-400"
        (click)="toggleMobileMenu()"
        >Home</a
      >
      <a
        routerLink="/demo-aanvragen"
        class="block py-2 text-sm font-medium text-gray-700 hover:text-primary-600 dark:text-slate-300 dark:hover:text-primary-400"
        (click)="toggleMobileMenu()"
        >Demo aanvragen</a
      >
      <a
        routerLink="/aanmelden"
        class="mt-2 block rounded-md bg-primary-600 px-4 py-2 text-center text-sm font-medium text-white hover:bg-primary-700"
        (click)="toggleMobileMenu()"
        >Aanmelden</a
      >
    </div>
  }
</header>
