<chairly-web-header />

<main class="bg-gray-50 py-16 dark:bg-slate-900 sm:py-24">
  <div class="mx-auto max-w-2xl px-4 text-center sm:px-6 lg:px-8">
    <!-- Success icon -->
    <div
      class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-green-100 dark:bg-green-900/30">
      <svg
        class="h-8 w-8 text-green-600 dark:text-green-400"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
      </svg>
    </div>

    <h1 class="mt-6 text-3xl font-bold tracking-tight text-gray-900 dark:text-white sm:text-4xl">
      {{ heading() }}
    </h1>
    <p class="mt-4 text-lg text-gray-700 dark:text-slate-300">
      {{ message() }}
    </p>

    <div class="mt-10">
      <a
        routerLink="/"
        class="rounded-lg bg-primary-600 px-8 py-3 text-base font-semibold text-white shadow-sm hover:bg-primary-700 dark:bg-primary-500 dark:hover:bg-primary-600">
        Terug naar home
      </a>
    </div>
  </div>
</main>

<chairly-web-footer />
