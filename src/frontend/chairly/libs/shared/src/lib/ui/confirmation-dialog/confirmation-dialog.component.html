<dialog
  class="fixed inset-0 z-50 m-0 h-screen w-screen max-h-none max-w-none border-0 bg-transparent p-0 backdrop:hidden"
  #dialogEl>
  <div class="flex h-full w-full items-center justify-center bg-black/50 p-4">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-auto">
      <div class="p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-2">
          {{ title() }}
        </h2>
        <p class="text-sm text-gray-600 mb-6">{{ message() }}</p>
        <div class="flex justify-end gap-3">
          <button
            type="button"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
            (click)="onCancel()">
            {{ cancelLabel() }}
          </button>
          <button type="button" [class]="confirmButtonClass()" (click)="onConfirm()">
            {{ confirmLabel() }}
          </button>
        </div>
      </div>
    </div>
  </div>
</dialog>
