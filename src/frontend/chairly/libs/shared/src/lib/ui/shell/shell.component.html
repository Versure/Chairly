<div class="flex h-screen">
  <nav class="w-60 bg-primary-700 text-white flex flex-col">
    <div class="p-5 text-xl font-bold border-b border-primary-600">Chairly</div>
    <ul class="flex-1 px-2 py-4 space-y-1">
      <li>
        <a
          routerLink="/diensten"
          routerLinkActive="bg-primary-600"
          class="flex items-center px-3 py-2 rounded-md text-sm font-medium text-white hover:bg-primary-600 transition-colors">
          Diensten
        </a>
      </li>
      <li>
        <a
          routerLink="/klanten"
          routerLinkActive="bg-primary-600"
          class="flex items-center px-3 py-2 rounded-md text-sm font-medium text-white hover:bg-primary-600 transition-colors">
          Klanten
        </a>
      </li>
      <li>
        <a
          routerLink="/medewerkers"
          routerLinkActive="bg-primary-600"
          class="flex items-center px-3 py-2 rounded-md text-sm font-medium text-white hover:bg-primary-600 transition-colors">
          Medewerkers
        </a>
      </li>
    </ul>
    <div class="p-3 border-t border-primary-600">
      <button
        type="button"
        (click)="themeService.toggle()"
        class="flex items-center justify-center w-full px-3 py-2 rounded-md text-sm font-medium text-white hover:bg-primary-600 transition-colors"
        [attr.aria-label]="
          themeService.isDark() ? 'Schakel naar licht thema' : 'Schakel naar donker thema'
        "
        [attr.title]="themeService.isDark() ? 'Licht thema' : 'Donker thema'">
        @if (themeService.isDark()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 mr-2"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            aria-hidden="true">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          Licht thema
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 mr-2"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            aria-hidden="true">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
          Donker thema
        }
      </button>
    </div>
  </nav>
  <main class="flex-1 overflow-auto bg-gray-50 dark:bg-slate-900 dark:text-slate-100">
    <router-outlet />
  </main>
</div>
