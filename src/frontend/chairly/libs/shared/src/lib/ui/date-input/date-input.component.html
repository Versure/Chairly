<div class="relative">
  <!-- Trigger -->
  <button
    type="button"
    [id]="inputId()"
    (click)="toggle()"
    (keydown)="onKeydown($event)"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-controls]="isOpen() ? popoverId() : null"
    role="combobox"
    [attr.aria-label]="inputId()"
    class="flex w-full items-center justify-between rounded-md border border-gray-300 bg-white px-3 py-2 text-left text-sm text-gray-900 focus:outline-none focus:ring-1 focus:ring-primary-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
    <span [class.text-gray-400]="!value()" [class.dark:text-slate-400]="!value()">
      {{ displayValue() || placeholder() }}
    </span>
    @if (icon() === 'calendar') {
      <svg
        class="h-4 w-4 text-gray-400 dark:text-slate-400"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    } @else {
      <svg
        class="h-4 w-4 text-gray-400 dark:text-slate-400"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    }
  </button>

  <!-- Popover -->
  @if (isOpen()) {
    <div
      [id]="popoverId()"
      class="absolute z-10 mt-1 w-full rounded-lg border border-gray-200 bg-white p-3 shadow-lg dark:border-slate-600 dark:bg-slate-800">
      <input
        #nativeInput
        [type]="type()"
        [value]="tempValue()"
        (input)="onNativeInput($event)"
        class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-primary-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white" />
      <div class="mt-3 flex justify-end gap-2">
        <button
          type="button"
          (click)="cancel()"
          class="rounded-md border border-gray-300 px-3 py-1.5 text-sm text-gray-700 hover:bg-gray-50 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-700">
          Annuleren
        </button>
        <button
          type="button"
          (click)="confirm()"
          class="rounded-md bg-primary-600 px-3 py-1.5 text-sm text-white hover:bg-primary-700 dark:bg-primary-500 dark:hover:bg-primary-600">
          Bevestigen
        </button>
      </div>
    </div>
  }
</div>
