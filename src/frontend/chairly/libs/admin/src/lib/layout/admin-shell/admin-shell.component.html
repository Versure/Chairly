<div class="flex h-screen bg-gray-50 dark:bg-slate-900">
  <!-- Mobile sidebar overlay -->
  @if (sidebarOpen()) {
    <div
      class="fixed inset-0 z-20 bg-black/50 lg:hidden"
      (click)="closeSidebar()"
      (keydown.escape)="closeSidebar()"
      role="button"
      tabindex="0"
      aria-label="Sluiten"></div>
  }

  <!-- Sidebar -->
  <aside
    class="fixed inset-y-0 left-0 z-30 w-64 transform bg-white dark:bg-slate-800 border-r border-gray-200 dark:border-slate-700 transition-transform duration-200 ease-in-out lg:translate-x-0 lg:static lg:inset-auto"
    [class.-translate-x-full]="!sidebarOpen()"
    [class.translate-x-0]="sidebarOpen()">
    <div class="flex h-16 items-center px-6 border-b border-gray-200 dark:border-slate-700">
      <h1 class="text-xl font-bold text-gray-900 dark:text-white">Chairly Admin</h1>
    </div>
    <nav class="mt-4 px-3">
      <a
        routerLink="/abonnementen"
        routerLinkActive="bg-primary-50 text-primary-700 dark:bg-slate-700 dark:text-primary-300"
        class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors"
        (click)="closeSidebar()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          viewBox="0 0 20 20"
          fill="currentColor">
          <path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z" />
          <path
            fill-rule="evenodd"
            d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z"
            clip-rule="evenodd" />
        </svg>
        Abonnementen
      </a>
    </nav>
  </aside>

  <!-- Main content -->
  <div class="flex flex-1 flex-col overflow-hidden">
    <!-- Header -->
    <header
      class="flex h-16 items-center justify-between border-b border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-6">
      <!-- Mobile menu button -->
      <button
        type="button"
        class="rounded-md p-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 lg:hidden"
        (click)="toggleSidebar()"
        aria-label="Menu openen">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <div class="hidden lg:block"></div>

      <!-- Right side: user info, theme toggle, logout -->
      <div class="flex items-center gap-4">
        <span class="text-sm font-medium text-gray-700 dark:text-gray-300">{{ userName() }}</span>

        <!-- Theme toggle -->
        <button
          type="button"
          class="rounded-md p-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700"
          (click)="toggleTheme()"
          [attr.aria-label]="isDark() ? 'Licht thema' : 'Donker thema'">
          @if (isDark()) {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              viewBox="0 0 20 20"
              fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
                clip-rule="evenodd" />
            </svg>
          } @else {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              viewBox="0 0 20 20"
              fill="currentColor">
              <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
            </svg>
          }
        </button>

        <!-- Logout -->
        <button
          type="button"
          class="rounded-md px-3 py-1.5 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700"
          (click)="logout()">
          Uitloggen
        </button>
      </div>
    </header>

    <!-- Content area -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet />
    </main>
  </div>
</div>
