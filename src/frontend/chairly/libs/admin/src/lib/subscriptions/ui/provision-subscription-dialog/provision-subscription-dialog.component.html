<dialog
  #dialog
  class="fixed inset-0 m-0 w-screen h-screen max-w-none max-h-none flex items-center justify-center border-0 bg-black/50 p-4">
  <div class="bg-white dark:bg-slate-800 rounded-lg shadow-xl w-full max-w-md mx-auto p-6">
    <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Abonnement activeren</h2>
    <p class="text-gray-700 dark:text-gray-300 mb-6">
      Weet u zeker dat u het abonnement voor <strong>{{ salonName() }}</strong> wilt activeren?
    </p>
    <div class="flex justify-end gap-3">
      <button
        type="button"
        class="rounded-md border border-gray-300 dark:border-slate-600 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700"
        [disabled]="isSubmitting()"
        (click)="onCancel()">
        Annuleren
      </button>
      <button
        type="button"
        class="rounded-md bg-primary-600 dark:bg-primary-500 px-4 py-2 text-sm font-medium text-white hover:bg-primary-700 dark:hover:bg-primary-600 disabled:opacity-50"
        [disabled]="isSubmitting()"
        (click)="onConfirm()">
        @if (isSubmitting()) {
          Bezig...
        } @else {
          Activeren
        }
      </button>
    </div>
  </div>
</dialog>
