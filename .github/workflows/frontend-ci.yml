name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend/chairly
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: src/frontend/chairly/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run affected tasks (push)
        if: github.event_name == 'push'
        run: npx nx affected -t lint test build e2e --base=origin/main~1 --head=HEAD

      - name: Run affected tasks (PR)
        if: github.event_name == 'pull_request'
        run: npx nx affected -t lint test build e2e
