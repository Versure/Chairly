name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/frontend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/frontend/**'

permissions:
  actions: read
  contents: read

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend/chairly
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - run: npx nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: src/frontend/chairly/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run affected tasks (push)
        if: github.event_name == 'push'
        run: npx nx affected -t lint test build e2e --base=origin/main~1 --head=HEAD

      - name: Run affected tasks (PR)
        if: github.event_name == 'pull_request'
        run: npx nx affected -t lint test build e2e

      - name: Nx Cloud self-healing
        run: npx nx-cloud fix-ci
        if: always()
