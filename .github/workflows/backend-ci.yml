name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/backend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/backend/**'

permissions:
  actions: read
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/backend/Chairly.slnx

      - name: Build
        run: dotnet build src/backend/Chairly.slnx --no-restore

      - name: Test
        run: dotnet test src/backend/Chairly.slnx --no-build
